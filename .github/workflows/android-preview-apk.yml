name: Android Preview APK

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-preview-apk
  cancel-in-progress: false

jobs:
  build-preview:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.6
          cache: true
      - name: Resolve locked Flutter dependencies
        run: flutter pub get --enforce-lockfile
      - name: Build installable staging preview
        run: >-
          flutter build apk --debug --flavor staging --no-pub
          --dart-define=MAYHEM_ENVIRONMENT=staging
          --dart-define=MAYHEM_NEW_FEED_ENABLED=true
          --build-name=0.1.0 --build-number=${{ github.run_number }}
      - name: Verify and package signed APK
        shell: bash
        run: |
          set -euo pipefail
          apk="build/app/outputs/flutter-apk/app-staging-debug.apk"
          test -s "$apk"
          apksigner="$(find "$ANDROID_HOME/build-tools" -type f -name apksigner | sort -V | tail -1)"
          test -n "$apksigner"
          "$apksigner" verify --verbose "$apk"
          mkdir -p build/preview
          cp "$apk" build/preview/Mayhem-staging-preview.apk
          sha256sum build/preview/Mayhem-staging-preview.apk > build/preview/Mayhem-staging-preview.apk.sha256
      - name: Upload installable preview
        uses: actions/upload-artifact@v4
        with:
          name: mayhem-staging-preview-${{ github.run_number }}
          path: |
            mobile/build/preview/Mayhem-staging-preview.apk
            mobile/build/preview/Mayhem-staging-preview.apk.sha256
          if-no-files-found: error
          retention-days: 7
