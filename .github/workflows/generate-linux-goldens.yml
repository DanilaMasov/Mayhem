name: Generate Linux Goldens

on:
  workflow_dispatch:
  push:
    branches:
      - codex/current-baseline

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.6
          cache: true
      - name: Resolve locked Flutter dependencies
        run: flutter pub get
      - name: Generate Linux golden baselines
        run: >-
          flutter test --no-pub --no-test-assets -j 1 --update-goldens
          test/app/vnext_phase4_golden_test.dart
          test/dev/motion_lab_golden_test.dart
      - name: Upload Linux golden baselines
        uses: actions/upload-artifact@v4
        with:
          name: linux-goldens
          path: mobile/test/**/goldens/linux/*.png
          if-no-files-found: error
          retention-days: 1
